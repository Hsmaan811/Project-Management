<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Manager</title>
    <link rel="stylesheet" href="/manager.css">
</head>
<body>
    <header class="top">
        <nav class="navbar">
            <div class="logo">Project Manager</div>
            <button class="navbutton" id="calendarBtn">Calendar</button>

            <dialog id="calendarDialog" class="calendar-modal">
                <div class="calendar-layout-container">
                    <div class="calendar-left-pane">
                        <div class="calendar-header-nav">
                            <button id="prevMonth">&#10094;</button>
                            <h2 id="monthYear">June 2026</h2>
                            <button id="nextMonth">&#10095;</button>
                        </div>

                        <div class="calendar-weekdays">
                            <div>Sun</div>
                            <div>Mon</div>
                            <div>Tue</div>
                            <div>Wed</div>
                            <div>Thu</div>
                            <div>Fri</div>
                            <div>Sat</div>
                        </div>

                        <div class="calendar-days-grid" id="calendarGrid">
                            </div>
                    </div>

                    <div class="calendar-right-pane">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 id="selectedDate">Select a Date</h3>
                            <button id="closeCalendar" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b;">&times;</button>
                        </div>

                        <div id="eventList" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>

                        <div class="form-group">
                            <input type="text" id="eventTitle" placeholder="Event title...">
                        </div>

                        <button id="addEventBtn" class="btn">Add Event</button>
                    </div>
                </div>
            </dialog>

            <div class="addtask">
                <button class="navbutton" id="addtskbtn">Add Task</button>
            </div>
            
            <dialog id="addtaskpopup">
                <div class="modal-content">
                    <h2>Add New Task</h2>
                    <form id="addTaskForm">
                        <div class="form-group">
                            <label for="taskName">Task Name:</label>
                            <input type="text" id="taskName" required>
                        </div>
                        <div class="form-group">
                            <label for="taskDescription">Description:</label>
                            <textarea id="taskDescription"></textarea>
                        </div>  
                        <div class="form-group">
                            <label for="duedate">Due Date (optional):</label>
                            <input type="date" id="duedate" name="duedate">
                        </div>  
                        <button type="submit" class="btn">Add Task</button>
                    </form>
                </div>
            </dialog>
        </nav>
    </header>

    <main class="main-content">
        <section class="sidebar">
            <aside class="project-list">
                <h3>Projects</h3>
                <div id="projects-container"></div>
            </aside>
            <div class="add-project-inline">
                <input type="text" id="newProjectInput" placeholder="New project name...">
                <button id="addProjectBtn">+</button>
            </div>
        </section> 

        <section class="task-list">
            <div class="task-header">
                <h2>Active Tasks</h2>
                <span id="task-count" class="task-count">0 Tasks Remaining</span>
            </div>
            <div id="tasks-container" class="tasks-container"></div>
        </section>
    </main>

    <script src="/main.js"></script>
</body>
</html>
