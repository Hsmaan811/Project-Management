    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>projectmanager</title>
        <link rel="stylesheet" href="manager.css">
    </head>
    <body>
        <header class="top">
            <nav class="navbar">
                <div class="logo">Project Manager</div>
                <button class="navbutton" id="calendarBtn">Calendar</button>

                <dialog id="calendarDialog">

                    <div class="calendar-popup">

                        <div class="calendar-header">
                            <h2>Calendar</h2>
                            <button id="closeCalendar">&times;</button>
                        </div>

                        <div class="calendar-body">

                            <!-- Left -->
                            <div class="calendar-left">

                                <div class="month-header">
                                    <button id="prevMonth">&#10094;</button>
                                    <h3 id="monthYear">June 2026</h3>
                                    <button id="nextMonth">&#10095;</button>
                                </div>

                                <div class="weekdays">
                                    <div>Sun</div>
                                    <div>Mon</div>
                                    <div>Tue</div>
                                    <div>Wed</div>
                                    <div>Thu</div>
                                    <div>Fri</div>
                                    <div>Sat</div>
                                </div>

                                <div class="calendar-grid" id="calendarGrid">
                                    <!-- JS will generate days -->
                                </div>

                            </div>
                            <div class="calendar-right">
                                <h3 id="selectedDate">
                                    Select a Date
                                </h3>

                                <div id="eventList"></div>

                                <input
                                    type="text"
                                    id="eventTitle"
                                    placeholder="Event title">

                                <button id="addEventBtn" class="btn">
                                    Add Event
                                </button>

                            </div>

                        </div>

                    </div>

                </dialog>
                <div class="addtask"><button class="navbutton" id="addtskbtn" >Add Task</button></div>
                <dialog id="addtaskpopup">
                    <div class="modal-content">
                        <h2>Add New Task</h2>
                        <form id="addTaskForm">
                            <div class="form-group">
                                    <label for="taskName">Task Name:</label>
                                <input type="text" id="taskName" required>
                            </div>
                            <div class="form-group">
                                <label for="taskDescription">Description:</label>
                                <textarea id="taskDescription"></textarea>
                            </div>  
                            <div class="form-group">
                            <label for="birthday">Due Date(optional):</label>
                                <input type="date" id="duedate" name="duedate">

                            </div>  
                            <button type="submit" class="btn">Add Task</button>
                        </form>
                    </div>
                </dialog>
               

            </nav>
        </header>
        <main class="main-content">
            <section class="sidebar">
                <aside class="project-list">
                    <h3>Projects</h3>
                    <div id="projects-container"></div>

                </aside>
                <div class="add-project-inline">
                    <input type="text" id="newProjectInput" placeholder="New project name...">
                     <button id="addProjectBtn">+</button>
                </div>
            </section> 

            <section class="task-list">
                <div class="task-header">
                    <h2>Active Tasks</h2>
                    <span id="task-count" class="task-count">0 Tasks Remaining</span>
                </div>
                <div id="tasks-container" class="tasks-container">
                </div>
            </section>
            
        </main>
        <script src="main.js"></script>
    </body>
    </html>
